# Publica o site estático no GitHub Pages a cada push para main.
# Depois do primeiro push: Settings > Pages > Source = "GitHub Actions".
name: Deploy no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite correr manualmente pelo separador Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys sobrepostos; deixa o último terminar.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # checkout@v5 corre em Node 24 (a @v4 usava Node 20, já deprecado).
      # As outras actions de Pages abaixo já estão nas versões actuais.
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Carregar o site (raiz do repositório)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
