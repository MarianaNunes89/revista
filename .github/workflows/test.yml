name: Testes do motor

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # As actions @v5 já correm em Node 24. As @v4 ainda usavam Node 20,
      # que o GitHub deixou de suportar — daí o aviso de deprecação no CI.
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Correr os testes do motor de interações
        run: node --test

      # O js/catalog.js é GERADO por data/build_catalogo.py.
      # Se alguém o editar à mão (ou publicar um sem publicar a fonte),
      # este passo apanha a dessincronização.
      - name: Verificar que o catálogo gerado está em dia
        run: |
          set -euo pipefail
          python3 data/build_catalogo.py
          if ! git diff --quiet -- js/catalog.js; then
            echo "::error::js/catalog.js está dessincronizado da sua fonte (data/build_catalogo.py)."
            echo "Corra 'python3 data/build_catalogo.py' e faça commit do js/catalog.js resultante."
            git diff --stat -- js/catalog.js
            exit 1
          fi
          echo "catalog.js está em dia com a sua fonte."
